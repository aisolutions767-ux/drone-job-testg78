<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>San Francisco Ferry Building - Fixed View</title>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>
<div id="cesiumContainer"></div>

<script>
// Your provided token
Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4MDNiNDQ4Yi1hMzg0LTQxYzEtYjMxYy00NGJlMjBiN2I4YzYiLCJpZCI6NDA2NzI3LCJpYXQiOjE3NzQwNTEzMzd9.W410ifK9UItmiq6mZIr0ot8JXGgi4T9mCBc9GIUaykA";

async function init() {

  const viewer = new Cesium.Viewer("cesiumContainer", {
    terrainProvider: new Cesium.EllipsoidTerrainProvider(),
    shouldAnimate: false, // Turned off animation since the camera is fixed
    shadows: true
  });

  viewer.scene.globe.enableLighting = true;

  // Your provided Asset ID
  const tileset = await Cesium.Cesium3DTileset.fromIonAssetId(4550299);
  viewer.scene.primitives.add(tileset);

  await tileset.readyPromise;

  // San Francisco Ferry Building Coordinates
  const targetLng = -122.3937;
  const targetLat = 37.7955;
  const targetAltitude = 105; // Look at the middle of the building

  const targetCenter = Cesium.Cartesian3.fromDegrees(targetLng, targetLat, targetAltitude);

  // Set fixed camera angle
  const heading = Cesium.Math.toRadians(45); // Looking North-East
  const pitch = Cesium.Math.toRadians(-15);  // Looking slightly down
  const range = 600; // Distance from the building in meters

  viewer.camera.lookAt(targetCenter, new Cesium.HeadingPitchRange(heading, pitch, range));
}

init();
</script>

</body>
</html>

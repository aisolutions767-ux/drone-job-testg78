<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Eiffel Tower - Fixed 3D View</title>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>
<div id="cesiumContainer"></div>

<script>
// Your provided token
Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4MDNiNDQ4Yi1hMzg0LTQxYzEtYjMxYy00NGJlMjBiN2I4YzYiLCJpZCI6NDA2NzI3LCJpYXQiOjE3NzQwNTEzMzd9.W410ifK9UItmiq6mZIr0ot8JXGgi4T9mCBc9GIUaykA";

async function init() {

  const viewer = new Cesium.Viewer("cesiumContainer", {
    terrainProvider: await Cesium.createWorldTerrainAsync(), // Adds 3D ground/hills
    shouldAnimate: false,
    shadows: true,
    baseLayerPicker: false,
    geocoder: false,
    homeButton: false,
    infoBox: false,
    navigationHelpButton: false,
    sceneModePicker: false,
    timeline: false,
    animation: false
  });

  viewer.scene.globe.enableLighting = true;

  try {
    // Asset 2275207 is the Global Google Photorealistic 3D Tileset on Cesium Ion
    const tileset = await Cesium.Cesium3DTileset.fromIonAssetId(2275207);
    viewer.scene.primitives.add(tileset);
  } catch (error) {
    console.error("Could not load 3D tiles:", error);
  }

  // 📍 Eiffel Tower Coordinates
  const targetLng = 2.2945;
  const targetLat = 48.8584;
  const targetAltitude = 150; // Focus the camera on the middle of the tower

  const targetCenter = Cesium.Cartesian3.fromDegrees(targetLng, targetLat, targetAltitude);

  // 🎥 3D Camera Positioning
  const heading = Cesium.Math.toRadians(135); // Looking South-East
  const pitch = Cesium.Math.toRadians(-10);   // Looking almost horizontally to show extreme 3D depth
  const range = 900; // Distance backed away from the tower

  viewer.camera.lookAt(targetCenter, new Cesium.HeadingPitchRange(heading, pitch, range));
}

init();
</script>

</body>
</html>
